<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HC Olympia — Velden vandaag</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1f232c; --line:#2a2f3a;
    --text:#e6e8ec; --muted:#8b93a3; --accent:#3aa3ff; --accent2:#7adfb0;
    --warn:#ffb86b; --bad:#ff7a90;
    --u7:#9b8cff; --u8:#7ad6ff; --u9:#7adfb0; --u10:#a7e26a;
    --u11:#d8db5a; --u12:#ffc36e; --u14:#ff9d6e; --u16:#ff7a90;
    --u19:#ff7adf; --senior:#3aa3ff; --gent:#a988ff; --junior:#56e3d3;
    --trim:#888;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif; }
  a { color:var(--accent); }

  header {
    display:flex; align-items:center; gap:16px; padding:14px 20px;
    background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10;
  }
  header .logo {
    height:42px; width:auto; object-fit:contain;
    background:#fff; border-radius:8px; padding:4px;
    box-shadow:0 1px 4px rgba(0,0,0,.3);
  }
  header h1 { margin:0; font-size:18px; font-weight:600; letter-spacing:.2px; }
  header h1 .sub { color:var(--muted); font-weight:400; margin-left:8px; font-size:13px; }
  header .grow { flex:1; }
  header input[type=date], header select, header button {
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:7px 11px; font:inherit;
  }
  header button { cursor:pointer; }
  header button:hover { border-color:var(--accent); }
  header .tabs { display:flex; gap:4px; background:var(--panel2); border-radius:10px; padding:3px; border:1px solid var(--line); }
  header .tabs button { background:transparent; border:none; padding:6px 12px; border-radius:7px; color:var(--muted); }
  header .tabs button.active { background:var(--accent); color:#0b1320; font-weight:600; }
  header .status { font-size:12px; color:var(--muted); }

  main { padding:18px 20px 60px; }
  .empty { padding:60px; text-align:center; color:var(--muted); }
  .error { padding:18px; border:1px solid var(--bad); background:rgba(255,122,144,.08); color:var(--bad); border-radius:10px; }

  /* ======== TIMELINE VIEW ======== */
  .timeline-wrap { display:grid; grid-template-columns: 60px repeat(3, 1fr); gap:8px; }
  .col-header {
    grid-row: 1; padding:12px 10px; background:var(--panel); border:1px solid var(--line);
    border-radius:10px 10px 0 0; font-weight:600; text-align:center; font-size:16px;
  }
  .col-header .count { color:var(--muted); font-weight:400; font-size:13px; margin-left:6px; }
  .time-axis { position:relative; }
  .time-axis .hour {
    position:absolute; right:6px; color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px;
    transform:translateY(-50%);
  }
  .field-col { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:0 0 10px 10px; }
  /* Field switcher row (phone only — desktop uses 3-column timeline) */
  .mobile-field-switcher { display:none; }
  .field-col .hour-line {
    position:absolute; left:0; right:0; border-top:1px dashed var(--line); opacity:.5;
  }
  .game {
    position:absolute; padding:8px 10px; border-radius:8px;
    background:var(--panel2); border:1px solid var(--line);
    overflow:hidden; cursor:default;
    box-shadow: 0 1px 0 rgba(255,255,255,.03);
  }
  .game .time { font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; font-weight:500; }
  .game .teams { font-weight:600; font-size:15px; margin-top:2px; line-height:1.25; }
  .game .div { font-size:12px; color:var(--muted); margin-top:3px; }
  .game .sub { display:inline-block; padding:1px 6px; border-radius:4px; background:rgba(255,255,255,.06);
    color:var(--text); font-size:11px; margin-left:6px; font-variant-numeric:tabular-nums; font-weight:600; }
  /* Stacked half-cells or deep-subdivided cells get tighter typography so team names fit. */
  .game.cramped { padding:4px 6px; }
  .game.cramped .time  { font-size:11px; }
  .game.cramped .teams { font-size:12px; line-height:1.18; margin-top:1px; }
  .game.cramped .sub   { font-size:10px; padding:0 4px; margin-left:4px; }
  .game.age-u7  { border-left:4px solid var(--u7); }
  .game.age-u8  { border-left:4px solid var(--u8); }
  .game.age-u9  { border-left:4px solid var(--u9); }
  .game.age-u10 { border-left:4px solid var(--u10); }
  .game.age-u11 { border-left:4px solid var(--u11); }
  .game.age-u12 { border-left:4px solid var(--u12); }
  .game.age-u14 { border-left:4px solid var(--u14); }
  .game.age-u16 { border-left:4px solid var(--u16); }
  .game.age-u19 { border-left:4px solid var(--u19); }
  .game.age-senior { border-left:4px solid var(--senior); }
  .game.age-gent   { border-left:4px solid var(--gent); }
  .game.age-junior { border-left:4px solid var(--junior); }
  .game.age-trim   { border-left:4px solid var(--trim); }

  /* ======== FIELD LAYOUT VIEW ======== */
  .layout-controls { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .layout-controls .slot-pick { display:flex; gap:6px; flex-wrap:wrap; }
  .layout-controls .slot-pick button {
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px 14px; font:inherit; font-size:15px; cursor:pointer; font-variant-numeric:tabular-nums; font-weight:500;
  }
  .layout-controls .now-label { font-size:15px; }
  .layout-controls .slot-pick button:hover { border-color:var(--accent); }
  .layout-controls .slot-pick button.active { background:var(--accent); color:#0b1320; border-color:var(--accent); font-weight:600; }
  .layout-controls .now-label { color:var(--muted); margin-right:4px; }

  /* Layout view: spatial map of the club (Veld 2 | Veld 1 | Clubhuis  /  · | Veld 5 | ·) */
  .fields-row {
    display:grid; grid-template-columns: 1fr 1fr 0.55fr;
    grid-template-rows: auto auto;
    gap:20px; align-items:start; max-width:1400px; margin:0 auto;
  }
  .field-card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; }
  .field-card h3 { margin:0 0 12px; font-size:18px; display:flex; justify-content:space-between; align-items:center; }
  .field-card h3 .meta { color:var(--muted); font-weight:400; font-size:13px; }
  .pitch {
    position:relative; width:100%; aspect-ratio: 55/91;
    background: repeating-linear-gradient(90deg, #1b3f25, #1b3f25 8px, #1d4528 8px, #1d4528 16px);
    border:2px solid #2d6a3e; border-radius:6px; overflow:hidden;
  }
  /* Clubhuis is a static wayfinding marker — no games, just an orange box for orientation. */
  .field-card.clubhuis { background:rgba(217,124,68,.08); border-color:rgba(217,124,68,.45); }
  .field-card.clubhuis h3 { color:#e89968; }
  .clubhuis-box {
    width:100%; aspect-ratio: 55/91;
    background: linear-gradient(160deg, #d97c44 0%, #b85e2e 100%);
    border:2px solid #8a4520; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:20px; font-weight:600; letter-spacing:.5px;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
  }
  .subcell {
    position:absolute; border:1px solid rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; text-align:center;
    color:#fff; padding:6px;
  }
  .subcell.empty {
    background:rgba(255,255,255,.03); color:rgba(255,255,255,.35);
  }
  .subcell.filled { background:rgba(58,163,255,.18); }
  .subcell .label { font-size:11px; color:rgba(255,255,255,.6); position:absolute; top:3px; left:5px; font-weight:600; letter-spacing:.5px; }
  .subcell .label.empty-lbl { position:relative; top:auto; left:auto; font-size:13px; font-weight:500; }
  .subcell .game-mini { display:flex; flex-direction:column; gap:2px; line-height:1.2; align-items:center; max-width:100%; }
  .subcell .game-mini .team { font-weight:700; }
  .subcell .game-mini .vs { opacity:.55; font-size:.7em; margin:1px 0; }
  .subcell .game-mini .div  { opacity:.8; margin-top:5px; font-size:.65em; font-weight:400; }
  .subcell.carryover { outline:1px dashed rgba(255,255,255,.22); }
  .subcell.carryover .carry-tag {
    position:absolute; top:3px; right:5px; font-size:10px; color:rgba(255,255,255,.6);
    background:rgba(0,0,0,.25); padding:1px 5px; border-radius:3px;
  }
  .subcell.age-u7  { background: rgba(155,140,255,.22); }
  .subcell.age-u8  { background: rgba(122,214,255,.22); }
  .subcell.age-u9  { background: rgba(122,223,176,.22); }
  .subcell.age-u10 { background: rgba(167,226,106,.22); }
  .subcell.age-u11 { background: rgba(216,219,90,.22); }
  .subcell.age-u12 { background: rgba(255,195,110,.22); }
  .subcell.age-u14 { background: rgba(255,157,110,.22); }
  .subcell.age-u16 { background: rgba(255,122,144,.22); }
  .subcell.age-u19 { background: rgba(255,122,223,.22); }
  .subcell.age-senior { background: rgba(58,163,255,.25); }
  .subcell.age-gent   { background: rgba(169,136,255,.25); }
  .subcell.age-junior { background: rgba(86,227,211,.22); }
  .subcell.age-trim   { background: rgba(150,150,150,.22); }
  .field-card .games-list { margin-top:12px; font-size:14px; color:var(--muted); }
  .field-card .games-list .row { display:flex; gap:10px; padding:4px 0; align-items:baseline; }
  .field-card .games-list .row .t { color:var(--text); font-variant-numeric:tabular-nums; font-weight:600; min-width:46px; }
  .field-card .games-list .row .s { color:var(--text); flex:1; display:flex; flex-direction:column; gap:2px; }
  .field-card .games-list .row .s .match-teams { font-weight:500; }
  .field-card .games-list .row .s .match-div { font-size:12px; color:var(--muted); }
  .field-card .games-list .row .sub-tag { font-size:11px; color:var(--muted); align-self:flex-start; }
  .field-card .games-list .row.carry .t::after { content:" •"; color:var(--accent2); }
  .field-card.idle .pitch { opacity:.5; }
  .field-card.idle .games-list { font-style:italic; }

  /* Legend */
  .legend { display:flex; gap:10px; flex-wrap:wrap; margin: 16px 0 0; font-size:11px; color:var(--muted); }
  .legend .chip { display:inline-flex; align-items:center; gap:5px; padding:2px 6px; background:var(--panel2); border:1px solid var(--line); border-radius:5px; }
  .legend .chip .sw { width:8px; height:8px; border-radius:2px; }

  /* ======== TEAMS VIEW ======== */
  .team-controls {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; margin-bottom:18px; max-width:1100px;
  }
  .team-controls label { color:var(--muted); font-size:13px; }
  .team-controls select {
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:8px 12px; font:inherit; font-size:15px; min-width:120px;
  }
  .team-controls .team-comp { color:var(--accent); font-weight:600; font-size:15px; }
  .team-section { max-width:1400px; margin-bottom:24px; }
  /* Single-column sections (last / upcoming matches) align with the standings column
     of pool-row above — same left edge, similar visual width. */
  .team-section:not(.pool-row) { max-width: 820px; }
  .team-section h2 {
    font-size:16px; margin:0 0 10px; color:var(--text); font-weight:600;
    letter-spacing:.3px; text-transform:uppercase; opacity:.85;
  }
  .empty-section { color:var(--muted); padding:18px; background:var(--panel); border:1px dashed var(--line); border-radius:8px; font-style:italic; }
  .standing-wrap { background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  table.standing-table { width:100%; border-collapse:collapse; font-size:14px; }
  table.standing-table th {
    text-align:left; padding:10px 12px; background:var(--panel2);
    color:var(--muted); font-weight:600; font-size:12px;
    text-transform:uppercase; letter-spacing:.5px;
    border-bottom:1px solid var(--line);
  }
  table.standing-table th.num,
  table.standing-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
  table.standing-table td {
    padding:9px 12px; border-bottom:1px solid var(--line);
  }
  table.standing-table tr:last-child td { border-bottom:none; }
  table.standing-table td.rank { color:var(--muted); width:40px; }
  table.standing-table td.team { font-weight:500; }
  table.standing-table tr.ours { background:rgba(58,163,255,.13); }
  table.standing-table tr.ours td.team { color:var(--accent); font-weight:700; }

  ul.match-list { list-style:none; padding:0; margin:0; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  /* One grid for ALL match-rows.
     Desktop: date | matchup | trailing | outcome (4 cols, score/badge fixed at right).
     Mobile (≤720): collapses to a 2-line card via grid-template-areas (see media query). */
  .match-row {
    display:grid;
    grid-template-columns: 64px minmax(0, 1fr) auto 36px;
    grid-template-areas: "datecol matchup trailing outcome";
    gap:12px; align-items:center;
    padding:10px 14px; border-bottom:1px solid var(--line); font-size:14px;
  }
  .match-row:last-child { border-bottom:none; }
  .match-row .row-date {
    grid-area:datecol; color:var(--muted); font-variant-numeric:tabular-nums;
    font-weight:600; display:flex; flex-direction:column; gap:2px; line-height:1.1;
  }
  .match-row .row-date .row-time { color:var(--muted); font-weight:500; font-size:12px; }
  .match-row .row-matchup {
    grid-area:matchup; color:var(--text); min-width:0;
    display:flex; flex-wrap:wrap; align-items:baseline; gap:0 6px;
  }
  .match-row .row-matchup .vs-dash { opacity:.45; }
  .match-row .row-matchup .row-div {
    flex-basis:100%; font-size:12px; color:var(--muted); margin-top:2px;
  }
  .match-row .row-trailing { grid-area:trailing; display:flex; align-items:center; justify-content:flex-end; }
  .match-row .row-outcome  { grid-area:outcome; text-align:center; font-weight:700; font-size:12px; padding:2px 0; border-radius:4px; min-width:24px; }
  .match-row .row-outcome.win  { background:rgba(122,223,176,.25); color:#aef0c8; }
  .match-row .row-outcome.loss { background:rgba(255,122,144,.22); color:#ffb3c0; }
  .match-row .row-outcome.draw { background:rgba(255,184,107,.20); color:#ffd29a; }
  /* Rows without an outcome shrink the last column to nothing */
  .match-row:not(:has(.row-outcome)) { grid-template-columns: 64px minmax(0, 1fr) auto; grid-template-areas: "datecol matchup trailing"; }

  /* Score pill — fixed compact width regardless of score text length */
  .match-row .score-pill {
    font-variant-numeric:tabular-nums; font-weight:700; font-size:14px;
    padding:3px 10px; border-radius:6px; background:var(--panel2); border:1px solid var(--line);
    text-align:center; min-width:70px;
  }
  .match-row .score-pill.win  { background:rgba(122,223,176,.18); border-color:rgba(122,223,176,.45); color:#aef0c8; }
  .match-row .score-pill.loss { background:rgba(255,122,144,.16); border-color:rgba(255,122,144,.40); color:#ffb3c0; }
  .match-row .score-pill.draw { background:rgba(255,184,107,.14); border-color:rgba(255,184,107,.40); color:#ffd29a; }
  .match-row .score-pill.upcoming { background:transparent; color:var(--muted); border-style:dashed; }

  /* Location tag (thuis / uit) */
  .match-row .loc-tag {
    display:inline-block; padding:3px 9px; border-radius:5px;
    font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase;
    background:var(--panel2); color:var(--muted); border:1px solid var(--line);
  }
  .match-row .loc-tag.home { background:rgba(58,163,255,.14); color:#7dbcff; border-color:rgba(58,163,255,.30); }
  .match-row .loc-tag.away { background:rgba(169,136,255,.14); color:#c4a8ff; border-color:rgba(169,136,255,.30); }

  /* Field badge — clickable, navigates into Veldindeling */
  .match-row .field-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:5px; cursor:pointer;
    font-size:12px; font-weight:600; letter-spacing:.3px;
    background:rgba(122,223,176,.16); color:#aef0c8; border:1px solid rgba(122,223,176,.4);
    transition: background 120ms ease, border-color 120ms ease;
    white-space:nowrap;
  }
  .match-row .field-badge:hover { background:rgba(122,223,176,.32); border-color:rgba(122,223,176,.7); }
  .match-row .field-badge .field-arrow { opacity:.7; font-size:11px; }

  /* Clickable Olympia team names — visible wherever a team name is rendered. */
  .team-link {
    color:var(--accent); cursor:pointer; border-bottom:1px dotted transparent;
    transition: border-color 120ms ease, color 120ms ease;
  }
  .team-link:hover { color:#9bcdff; border-bottom-color:#9bcdff; }
  .game .teams .team-link,
  .subcell .team .team-link { color:inherit; border-bottom-color:rgba(255,255,255,.25); }
  .game .teams .team-link:hover,
  .subcell .team .team-link:hover { border-bottom-color:#fff; }

  /* ======== WEEK VIEW ======== */
  .week-controls {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 16px; margin-bottom:18px; max-width:1100px;
  }
  .week-controls button {
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:8px 14px; font:inherit; font-size:14px; cursor:pointer;
  }
  .week-controls button:hover:not([disabled]) { border-color:var(--accent); }
  .week-controls button[disabled] { opacity:.4; cursor:default; }
  .week-controls .week-label { flex:1; display:flex; flex-direction:column; gap:2px; }
  .week-controls .week-range { font-size:17px; font-weight:600; letter-spacing:.2px; }
  .week-controls .week-meta { color:var(--muted); font-size:12px; }
  /* Week stats strip — 4 tiles below the week controls (played + W/D/L percentages). */
  .week-stats {
    display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;
    max-width:1100px; margin-bottom:18px;
  }
  .week-stats .stat {
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px;
  }
  .week-stats .stat-value {
    font-size:26px; font-weight:700; line-height:1.1; font-variant-numeric:tabular-nums;
    letter-spacing:.5px;
  }
  .week-stats .stat-label {
    font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
    margin-top:6px;
  }
  .week-stats .stat-label .stat-count { color:var(--text); font-weight:600; }
  .week-stats .stat.played .stat-value { color:var(--text); }
  .week-stats .stat.win   { border-color:rgba(122,223,176,.35); }
  .week-stats .stat.win   .stat-value { color:#aef0c8; }
  .week-stats .stat.draw  { border-color:rgba(255,184,107,.35); }
  .week-stats .stat.draw  .stat-value { color:#ffd29a; }
  .week-stats .stat.loss  { border-color:rgba(255,122,144,.30); }
  .week-stats .stat.loss  .stat-value { color:#ffb3c0; }

  .week-day { max-width:1100px; margin-bottom:18px; }
  .week-day h3 {
    margin:0 0 8px; font-size:15px; color:var(--text);
    text-transform:uppercase; letter-spacing:.5px; opacity:.85;
    display:flex; align-items:center; gap:10px;
  }
  .week-day.today h3 { color:var(--accent); opacity:1; }
  .week-day h3 .today-tag {
    font-size:10px; padding:2px 8px; border-radius:4px;
    background:var(--accent); color:#0b1320; font-weight:700; letter-spacing:.5px;
  }
  /* Week-view rows: time | matchup | division tag | score | outcome — all fixed except matchup */
  .week-day .match-row {
    grid-template-columns: 56px minmax(0, 1fr) 200px 90px 36px;
  }
  .week-day .match-row .div-tag {
    font-size:11px; color:var(--muted); white-space:nowrap;
    padding:3px 8px; border-radius:4px; background:var(--panel2); border:1px solid var(--line);
  }
  .week-day .match-row.upcoming .score-pill.upcoming {
    background:transparent; color:var(--muted); border-style:dashed;
  }

  /* ======== POOL-ROW (standings + this-week-in-pool side-by-side) ======== */
  .team-section.pool-row {
    display:grid; grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr); gap:18px;
    align-items:start; max-width:1400px;
  }
  .pool-col { display:flex; flex-direction:column; min-width:0; }
  .pool-col h2 {
    font-size:16px; margin:0 0 10px; color:var(--text); font-weight:600;
    letter-spacing:.3px; text-transform:uppercase; opacity:.85;
  }
  .pool-week-list { display:flex; flex-direction:column; gap:10px; }
  .pool-day {
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 12px 10px;
  }
  .pool-day.today { border-color:rgba(58,163,255,.45); }
  .pool-day-header {
    font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
    padding:4px 0 6px; display:flex; align-items:center; gap:8px;
  }
  .pool-day.today .pool-day-header { color:var(--accent); }
  .pool-day-header .today-tag {
    font-size:10px; padding:1px 7px; border-radius:4px;
    background:var(--accent); color:#0b1320; font-weight:700; letter-spacing:.5px;
  }
  ul.pool-week-matches { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px; }
  .pool-match {
    display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px;
    background:var(--panel2); font-size:13px;
  }
  .pool-match.our-match { background:rgba(58,163,255,.13); }
  .pool-match .pool-teams { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
  .pool-match .pool-score {
    font-variant-numeric:tabular-nums; font-weight:600;
    padding:2px 8px; border-radius:5px; min-width:54px; text-align:center;
    background:var(--panel); border:1px solid var(--line);
  }
  .pool-match .pool-score.played    { background:rgba(122,223,176,.18); border-color:rgba(122,223,176,.40); color:#aef0c8; }
  .pool-match .pool-score.scheduled { color:var(--muted); }

  /* ======== RESPONSIVE — tablet (<=1100px) ======== */
  @media (max-width: 1100px) {
    header { gap:10px; flex-wrap:wrap; padding:10px 14px; }
    header h1 { font-size:16px; }
    header h1 .sub { display:none; }
    header .tabs button { padding:6px 10px; font-size:13px; }
    main { padding:14px 14px 60px; }

    /* Inline style="grid-column:X;grid-row:Y" on cards has higher specificity than
       plain selectors, so the column/row overrides need !important here. */
    .fields-row { grid-template-columns: 1fr 1fr; }
    .field-card.clubhuis { grid-column: 2 !important; grid-row: 2 !important; }
    /* Place Veld 5 across both columns on row 3 */
    .field-card:not(.clubhuis):nth-child(4) {
      grid-column: 1 / span 2 !important; grid-row: 3 !important;
      max-width:520px; margin:0 auto;
    }

    .team-section.pool-row { grid-template-columns: 1fr; }
    table.standing-table { font-size:13px; }
    table.standing-table th, table.standing-table td { padding:7px 8px; }
  }

  /* ======== RESPONSIVE — phone (<=720px) ========
     Strategy: compact sticky top bar (logo + title + date), tabs pushed to fixed
     bottom nav, single-column content, match-rows as cards with everything inline. */
  @media (max-width: 720px) {
    /* HEADER: one tight row at the top */
    header {
      gap:8px; padding:8px 10px; flex-wrap:nowrap;
    }
    header .logo { height:28px; padding:2px; border-radius:6px; }
    header h1 { font-size:14px; line-height:1.15; }
    header h1 .sub { display:none; }
    header .grow { display:none; }
    header .status { display:none; }
    header input[type=date] {
      padding:5px 6px; font-size:12px; flex:1; min-width:0; max-width:130px;
    }
    header button { padding:5px 8px; font-size:12px; }
    header #today { font-size:11px; padding:5px 8px; }

    /* TABS → fixed bottom navigation bar (native-app feel) */
    header .tabs {
      position:fixed; bottom:0; left:0; right:0; z-index:50;
      border-radius:0; padding:6px 4px; border:none; border-top:1px solid var(--line);
      background:var(--panel); box-shadow:0 -2px 12px rgba(0,0,0,.45);
      display:flex; justify-content:space-around; gap:2px;
    }
    header .tabs button {
      flex:1; padding:8px 4px; font-size:11px; font-weight:600;
      border-radius:8px; letter-spacing:.2px; text-align:center;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    header .tabs button.active { background:var(--accent); color:#0b1320; }
    /* Body needs bottom padding to clear the fixed nav */
    main { padding:14px 12px 80px; }

    /* TIMELINE: switch from 3-column horizontal-scroll to single-field-at-a-time
       via a field-switcher row. Logic in JS hides non-active columns. */
    .timeline-wrap {
      min-width:0;
      grid-template-columns: 44px 1fr !important;
      gap:4px;
    }
    .timeline-wrap .col-header { font-size:14px; padding:8px 6px; }
    .mobile-field-switcher {
      display:flex; gap:6px; margin-bottom:10px; overflow-x:auto;
      padding-bottom:2px; -webkit-overflow-scrolling:touch;
    }
    .mobile-field-switcher button {
      flex:0 0 auto; background:var(--panel2); color:var(--text);
      border:1px solid var(--line); border-radius:8px; padding:8px 14px;
      font:inherit; font-size:13px; font-weight:600; cursor:pointer;
      white-space:nowrap;
    }
    .mobile-field-switcher button.active { background:var(--accent); color:#0b1320; border-color:var(--accent); }
    /* JS renders only the selected field's column on mobile — no CSS hiding needed */

    /* LAYOUT view: single column, full width, no max-width tweaks */
    .fields-row { grid-template-columns: 1fr; max-width:none; gap:12px; }
    .field-card { grid-column: 1 !important; grid-row: auto !important; padding:10px; }
    .field-card.clubhuis { display:none; }   /* save space on phone — clubhuis is a wayfinding nicety */
    .field-card:not(.clubhuis):nth-child(4) { max-width:none; margin:0; }
    .subcell .game-mini .div { display:none; }

    /* MATCH-ROW as a 2-line card */
    .match-row {
      grid-template-columns: auto 1fr auto !important;
      grid-template-areas:
        "datecol matchup trailing"
        "datecol matchup outcome" !important;
      gap:6px 10px !important; padding:10px 12px !important;
      align-items:center; font-size:13px;
    }
    .match-row:not(:has(.row-outcome)) {
      grid-template-areas: "datecol matchup trailing" !important;
    }
    .match-row .row-date {
      grid-area:datecol; flex-direction:column; gap:1px;
      font-size:13px; line-height:1.1; min-width:42px;
    }
    .match-row .row-date .row-time { font-size:12px; }
    .match-row .row-matchup {
      grid-area:matchup; font-size:13px; line-height:1.3;
    }
    .match-row .row-matchup .row-div { font-size:11px; margin-top:1px; }
    .match-row .row-trailing { grid-area:trailing; }
    .match-row .row-outcome  { grid-area:outcome; justify-self:end; align-self:end; }
    .match-row .score-pill { font-size:12px; padding:2px 8px; min-width:56px; }
    .match-row .loc-tag    { font-size:10px; padding:2px 7px; }
    .match-row .field-badge{ font-size:11px; padding:3px 8px; }

    /* TEAMS: stack standings + pool-week */
    .team-section.pool-row { grid-template-columns: 1fr; gap:16px; }
    .team-section { max-width:none !important; }
    .team-controls { padding:10px 12px; gap:8px; }
    .team-controls .team-comp { font-size:13px; }
    .team-controls select { font-size:14px; padding:6px 10px; min-width:100px; }

    /* WEEK: stats 2x2 + tighter controls */
    .week-controls { padding:10px 12px; gap:8px; }
    .week-controls .week-range { font-size:14px; }
    .week-controls .week-meta  { font-size:11px; }
    .week-stats { grid-template-columns: 1fr 1fr; gap:8px; }
    .week-stats .stat { padding:10px 12px; }
    .week-stats .stat-value { font-size:22px; }
    .week-day h3 { font-size:13px; }

    /* STANDINGS table — hide W/L/D, tighten padding, prevent wrap */
    table.standing-table { font-size:12px; }
    table.standing-table th, table.standing-table td { padding:6px 7px; }
    table.standing-table th { font-size:10px; }
    table.standing-table td.team { white-space:normal; line-height:1.2; }
    table.standing-table th:nth-child(4),
    table.standing-table td:nth-child(4),
    table.standing-table th:nth-child(5),
    table.standing-table td:nth-child(5),
    table.standing-table th:nth-child(6),
    table.standing-table td:nth-child(6) { display:none; }

    /* POOL-MATCH (this-week-in-poule) — tighten too */
    .pool-match { font-size:12px; padding:5px 7px; }
    .pool-match .pool-score { min-width:48px; font-size:12px; padding:1px 6px; }

    /* Legend chips — wrap freely */
    .legend { font-size:10px; }
  }
</style>
</head>

<script>
// ============================================================
// Olympia field-schedule viewer — reads embedded data, no fetch.
// To refresh data: run update.ps1 (uses hockey.be Sportlink API).
// ============================================================

const FIELDS = [
  { code: "1", label: "Veld 1" },
  { code: "2", label: "Veld 2" },
  { code: "5", label: "Veld 5" },
];

// Spatial map for the LAYOUT VIEW — mirrors the actual club site at Wilrijkse Plein.
// Top row: Veld 2 | Veld 1 | Clubhuis. Bottom row: Veld 5 below Veld 1.
const LAYOUT_GRID = [
  { type: "field",    code: "2", label: "Veld 2",   col: 1, row: 1 },
  { type: "field",    code: "1", label: "Veld 1",   col: 2, row: 1 },
  { type: "clubhuis",            label: "Clubhuis", col: 3, row: 1 },
  { type: "field",    code: "5", label: "Veld 5",   col: 2, row: 2 },
];
const TIMELINE_START_H = 8;
const TIMELINE_END_H = 22;
const PX_PER_HOUR = 130;  // 1h block = 130px so stacked half-cells are still ~63px tall

// ----- Load embedded data -----
function loadEmbedded() {
  const el = document.getElementById("games-data");
  const json = JSON.parse(el.textContent);
  // PowerShell quirks: empty arrays serialize as `{}`, and single-element arrays get
  // unwrapped into scalars (`subpath: "A"` instead of `["A"]`). Normalize both cases.
  const asArr = v => {
    if (Array.isArray(v)) return v;
    if (typeof v === "string" && v.length > 0) return [v];
    return [];
  };
  // Schema v2: fieldGames + teamGames + results + teams.
  // Older schema (single "games" array of home games) — fall back.
  const rawField = json.fieldGames || json.games || [];
  const fieldGames = rawField.map(g => ({
    date: g.date,
    time: g.time,
    field: { fieldCode: g.fieldCode, subpath: asArr(g.subpath) },
    division: g.division,
    home: { club: "Olympia", team: g.homeTeam },
    away: { club: g.awayClub, team: g.awayTeam },
  }));
  const teamGames = (json.teamGames || []).map(g => ({ ...g, subpath: asArr(g.subpath) }));
  return {
    updated:    json.updated,
    fieldGames,
    teamGames,
    results:    json.results   || [],
    teams:      json.teams     || [],
    poolGames:  json.poolGames || {},   // poolId -> array of pool-wide games (all teams in pool)
  };
}

function fmtDateAPI(d) {
  // Local YYYY-MM-DD — NOT toISOString(), which would round-trip via UTC and
  // silently subtract a day in positive-offset zones (Brussels is UTC+1/+2).
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}
function fmtUpdated(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return "—";
  return d.toLocaleString("nl-BE", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

// ----- Age class from team name (U7G-3, D-2, G-1, JL-1, T-1) -----
function ageClass(home) {
  const t = home.team || "";
  const m = t.match(/^U(\d+)/i);
  if (m) {
    const n = parseInt(m[1], 10);
    if (n <= 7) return "u7";
    if (n === 8) return "u8";
    if (n === 9) return "u9";
    if (n === 10) return "u10";
    if (n === 11) return "u11";
    if (n === 12) return "u12";
    if (n === 14) return "u14";
    if (n === 16) return "u16";
    return "u19";
  }
  if (/^G/i.test(t)) return "gent";
  if (/^JL|^JM|^J\d/i.test(t)) return "junior";
  if (/^T/i.test(t)) return "trim";
  if (/^D|^H/i.test(t)) return "senior";
  return "senior";
}

// ----- Subcell geometry -----
// Two coordinate systems:
//
//   subpathToRectPitch — physical geometry of the actual pitch (used in LAYOUT view).
//     Mirrors the real club setup: A is the top half-pitch, B is the bottom half,
//     and within B the 1/2 split is also top/bottom, then a/b splits each band
//     left/right. So B1a/B1b/B2a/B2b form a 2x2 grid of mini-pitches inside B.
//
//   subpathToRectTimeline — packing for the TIMELINE view, where horizontal
//     space is exclusive (no two games can share a column). Here A/B are a
//     left/right split so the half-pitch games sit side by side in the column,
//     and 1/2 stays a top/bottom split inside that column (so simultaneous
//     B1a/B2a stack vertically within the time-block).
function subpathToRectPitch(subpath) {
  let x=0, y=0, w=100, h=100;
  for (const part of subpath) {
    if (part === "A" || part === "B") {
      h = h / 2;
      if (part === "B") y = y + h;
    } else if (part === "1" || part === "2") {
      h = h / 2;
      if (part === "2") y = y + h;
    } else if (part === "a" || part === "b") {
      w = w / 2;
      if (part === "b") x = x + w;
    }
  }
  return { x, y, w, h };
}
function subpathToRectTimeline(subpath) {
  let x=0, y=0, w=100, h=100;
  for (const part of subpath) {
    if (part === "A" || part === "B") {
      w = w / 2;
      if (part === "B") x = x + w;
    } else if (part === "1" || part === "2") {
      h = h / 2;
      if (part === "2") y = y + h;
    } else if (part === "a" || part === "b") {
      w = w / 2;
      if (part === "b") x = x + w;
    }
  }
  return { x, y, w, h };
}
function otherSibling(c) {
  return { "A":"B", "B":"A", "1":"2", "2":"1", "a":"b", "b":"a" }[c] || c;
}
function planFieldSubcells(games) {
  if (games.length === 0) {
    return [{ rect: { x:0, y:0, w:100, h:100 }, subpath: [], empty: true }];
  }
  const used = games.map(g => ({ rect: subpathToRectPitch(g.subpath), game: g, subpath: g.subpath, empty: false }));
  const emptyRects = [];
  const seen = new Set();
  for (const g of games) {
    for (let i = 1; i <= g.subpath.length; i++) {
      const prefix = g.subpath.slice(0, i);
      const sibPath = [...prefix.slice(0,-1), otherSibling(prefix[prefix.length-1])];
      const sibKey = sibPath.join("");
      if (seen.has(sibKey)) continue;
      seen.add(sibKey);
      const occupied = games.some(g2 => {
        const sp = g2.subpath.join("");
        return sp === sibKey || sp.startsWith(sibKey);
      });
      if (!occupied) {
        emptyRects.push({ rect: subpathToRectPitch(sibPath), subpath: sibPath, empty: true });
      }
    }
  }
  return [...used, ...emptyRects];
}

// ----- Filtering -----
function gamesOnDate(games, dateStr) {
  return games.filter(g => g.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
}

// ----- Rendering: TIMELINE -----
function renderTimeline(games) {
  const main = document.getElementById("main");
  if (games.length === 0) {
    main.innerHTML = `<div class="empty">Geen wedstrijden op deze dag.</div>`;
    return;
  }
  const hourHeight = PX_PER_HOUR;
  const totalH = (TIMELINE_END_H - TIMELINE_START_H) * hourHeight;

  // On phones, render ONE field column at a time (controlled by the pill switcher).
  // Default to the field with the most games today so phone-users land on something useful.
  const isMobile = window.matchMedia("(max-width: 720px)").matches;
  if (!state.mobileTimelineField) {
    let best = FIELDS[0].code, bestN = -1;
    for (const f of FIELDS) {
      const n = games.filter(g => g.field.fieldCode === f.code).length;
      if (n > bestN) { bestN = n; best = f.code; }
    }
    state.mobileTimelineField = best;
  }
  const visibleFields = isMobile
    ? FIELDS.filter(f => f.code === state.mobileTimelineField)
    : FIELDS;
  const axisW = isMobile ? 44 : 60;
  const colTemplate = `${axisW}px repeat(${visibleFields.length}, 1fr)`;

  // Field switcher pill row (CSS shows it only on mobile)
  let html = `<div class="mobile-field-switcher">`;
  for (const f of FIELDS) {
    const n = games.filter(g => g.field.fieldCode === f.code).length;
    const active = f.code === state.mobileTimelineField ? " active" : "";
    html += `<button class="${active.trim()}" data-mfield="${f.code}">${f.label} <span style="opacity:.6">(${n})</span></button>`;
  }
  html += `</div>`;

  html += `<div class="timeline-wrap" style="grid-template-rows: auto ${totalH}px; grid-template-columns: ${colTemplate};">`;
  html += `<div class="col-header" style="background:transparent;border:none;"></div>`;
  for (const f of visibleFields) {
    const n = games.filter(g => g.field.fieldCode === f.code).length;
    html += `<div class="col-header">${f.label} <span class="count">${n} wedstrijden</span></div>`;
  }
  html += `<div class="time-axis" style="position:relative; height:${totalH}px;">`;
  for (let h = TIMELINE_START_H; h <= TIMELINE_END_H; h++) {
    const top = (h - TIMELINE_START_H) * hourHeight;
    html += `<div class="hour" style="top:${top}px">${String(h).padStart(2,"0")}:00</div>`;
  }
  html += `</div>`;

  for (const f of visibleFields) {
    html += `<div class="field-col" style="height:${totalH}px">`;
    for (let h = TIMELINE_START_H; h <= TIMELINE_END_H; h++) {
      const top = (h - TIMELINE_START_H) * hourHeight;
      html += `<div class="hour-line" style="top:${top}px"></div>`;
    }
    const fieldGames = games.filter(g => g.field.fieldCode === f.code);
    const byTime = new Map();
    fieldGames.forEach(g => {
      if (!byTime.has(g.time)) byTime.set(g.time, []);
      byTime.get(g.time).push(g);
    });
    for (const [time, list] of byTime) {
      const [hh, mm] = time.split(":").map(Number);
      const top = ((hh + mm/60) - TIMELINE_START_H) * hourHeight;
      const height = hourHeight * 1.0 - 4;
      // Group simultaneous games on this field by their horizontal column (x,w).
      // Games sharing a column (e.g. B1a/B2a — same x, same w, different y on the pitch)
      // get stacked vertically inside the time-block using their rect.y / rect.h.
      const cols = new Map();
      list.forEach(g => {
        const r = g.field.subpath.length ? subpathToRectTimeline(g.field.subpath) : { x:0, y:0, w:100, h:100 };
        const key = `${r.x}|${r.w}`;
        if (!cols.has(key)) cols.set(key, { x: r.x, w: r.w, items: [] });
        cols.get(key).items.push({ g, r });
      });
      for (const col of cols.values()) {
        col.items.forEach(({ g, r }) => {
          const subTop    = top + (r.y / 100) * height;
          const subHeight = (r.h / 100) * height - 2;
          const ageCls = `age-${ageClass(g.home)}`;
          const subLabel = g.field.subpath.length ? g.field.subpath.join("") : "";
          // When a cell is short (stacked half-cell) or narrow (deep subdivision),
          // drop the division line and tighten typography so the team names survive.
          const cramped = subHeight < 80 || g.field.subpath.length >= 3;
          const showDiv = subHeight >= 70;
          html += `<div class="game ${ageCls}${cramped ? ' cramped' : ''}" style="
              top:${subTop}px; height:${subHeight}px;
              left: calc(${col.x}% + 4px);
              width: calc(${col.w}% - 8px);
              ">
            <div class="time">${time}${subLabel?` <span class="sub">${subLabel}</span>`:""}</div>
            <div class="teams"><span class="team-link" data-team="${escape(g.home.team)}">${escape(g.home.team)}</span> – ${escape(g.away.club)} ${escape(g.away.team)}</div>
            ${showDiv ? `<div class="div">${escape(cleanDivision(g.division))}</div>` : ``}
          </div>`;
        });
      }
    }
    html += `</div>`;
  }
  html += `</div>`;
  html += renderLegend();
  main.innerHTML = html;

  // Mobile field-switcher pills — re-render to swap the visible column
  main.querySelectorAll(".mobile-field-switcher button").forEach(b => {
    b.addEventListener("click", () => {
      state.mobileTimelineField = b.dataset.mfield;
      render();
    });
  });
}

// ----- Rendering: LAYOUT -----
// A game is "active" at a slot if it started within the previous 60 min
// (i.e. game runs from g.time .. g.time+60min and slot falls in that range).
function toMin(hhmm) { const [h,m] = hhmm.split(":").map(Number); return h*60+m; }
function isActiveAt(game, slot) {
  const g = toMin(game.time), s = toMin(slot);
  return s >= g && s < g + 60;
}
// Font sizing by subdivision depth: full field gets huge text; subdivided cells smaller.
function fontForDepth(depth) {
  // depth 0 (full), 1 (half), 2 (quarter), 3 (eighth)
  return Math.max(11, 22 - depth * 4);
}

function renderLayout(games, activeSlot) {
  const main = document.getElementById("main");
  const slots = [...new Set(games.map(g => g.time))].sort();
  if (games.length === 0) {
    main.innerHTML = `<div class="empty">Geen wedstrijden op deze dag.</div>`;
    return;
  }
  if (!activeSlot || !slots.includes(activeSlot)) activeSlot = pickDefaultSlot(slots);

  let html = `<div class="layout-controls">
    <span class="now-label">Tijdslot:</span>
    <div class="slot-pick">${slots.map(s =>
      `<button data-slot="${s}" class="${s===activeSlot?"active":""}">${s}</button>`
    ).join("")}</div>
  </div>`;
  html += `<div class="fields-row">`;
  for (const cell of LAYOUT_GRID) {
    const gridStyle = `grid-column:${cell.col};grid-row:${cell.row};`;
    if (cell.type === "clubhuis") {
      html += `<div class="field-card clubhuis" style="${gridStyle}">
        <h3>${cell.label}</h3>
        <div class="clubhuis-box">${cell.label}</div>
      </div>`;
      continue;
    }
    const f = cell;
    // Active = games started at this slot OR carried over from up to 60 min earlier
    const activeGames = games.filter(g => isActiveAt(g, activeSlot) && g.field.fieldCode === f.code);
    const cells = planFieldSubcells(activeGames.map(g => ({ subpath: g.field.subpath, game: g })));
    const idle = activeGames.length === 0;
    html += `<div class="field-card ${idle?"idle":""}" style="${gridStyle}">
      <h3>${f.label} <span class="meta">${activeGames.length} wedstrijd${activeGames.length===1?"":"en"}</span></h3>
      <div class="pitch">`;
    for (const c of cells) {
      const r = c.rect;
      const subLabel = c.subpath.length ? c.subpath.join("") : "vol veld";
      if (c.empty) {
        html += `<div class="subcell empty" style="left:${r.x}%;top:${r.y}%;width:${r.w}%;height:${r.h}%;">
          <span class="label empty-lbl">${subLabel}</span></div>`;
      } else {
        const g = c.game.game;
        const ageCls = `age-${ageClass(g.home)}`;
        const depth = g.field.subpath.length;
        const fs = fontForDepth(depth);
        const isCarry = g.time !== activeSlot;
        html += `<div class="subcell filled ${ageCls} ${isCarry?'carryover':''}"
            style="left:${r.x}%;top:${r.y}%;width:${r.w}%;height:${r.h}%;font-size:${fs}px;">
          <span class="label">${subLabel}</span>
          ${isCarry ? `<span class="carry-tag">${g.time}</span>` : ''}
          <div class="game-mini">
            <span class="team">${olympiaLink(g.home.team)}</span>
            <span class="vs">vs</span>
            <span class="team">${escape(g.away.club)} ${escape(g.away.team)}</span>
            ${depth < 2 ? `<span class="div">${escape(shortDiv(g.division))}</span>` : ''}
          </div>
        </div>`;
      }
    }
    html += `</div>`;
    if (activeGames.length === 0) {
      html += `<div class="games-list">Geen wedstrijd in dit tijdslot</div>`;
    } else {
      html += `<div class="games-list">`;
      activeGames.forEach(g => {
        const sp = g.field.subpath.length ? g.field.subpath.join("") : "vol veld";
        const carry = g.time !== activeSlot;
        html += `<div class="row${carry?' carry':''}">
          <span class="t">${g.time}</span>
          <span class="s">
            <span class="match-teams">${olympiaLink(g.home.team)} – ${escape(g.away.club)} ${escape(g.away.team)}</span>
            <span class="match-div">${escape(cleanDivision(g.division))}</span>
          </span>
          <span class="sub-tag">${sp}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  html += renderLegend();
  main.innerHTML = html;

  main.querySelectorAll(".slot-pick button").forEach(b => {
    b.addEventListener("click", () => { state.activeSlot = b.dataset.slot; render(); });
  });
}

function pickDefaultSlot(slots) {
  const today = new Date(state.date + "T00:00:00");
  const now = new Date();
  if (today.toDateString() === now.toDateString()) {
    const hhmm = now.toTimeString().slice(0,5);
    return slots.find(s => s >= hhmm) || slots[slots.length - 1];
  }
  return slots[0];
}

function renderLegend() {
  const items = [
    ["U7","var(--u7)"],["U8","var(--u8)"],["U9","var(--u9)"],["U10","var(--u10)"],
    ["U11","var(--u11)"],["U12","var(--u12)"],["U14","var(--u14)"],["U16","var(--u16)"],
    ["U19","var(--u19)"],["Senior (D/H)","var(--senior)"],["Gentlemen","var(--gent)"],
    ["Junior","var(--junior)"],["Trimmers","var(--trim)"],
  ];
  return `<div class="legend">${items.map(([n,c]) =>
    `<span class="chip"><span class="sw" style="background:${c}"></span>${n}</span>`
  ).join("")}</div>`;
}

function shortDiv(div) {
  return cleanDivision(div).replace(/\s*-\s*HV.*$/, "").replace(/Belgian League\s*/,"BL ").slice(0,42);
}
// Strip the literal " (2)" segment Sportlink injects into youth division names
// ("U10 Boys (2) - HV 1 B") — meaningless to club users, just visual noise.
function cleanDivision(div) {
  if (!div) return "";
  return div.replace(/\s*\(2\)\s*/g, " ").replace(/\s+/g, " ").trim();
}
function escape(s) {
  return (s || "").replace(/[<>&"]/g, ch => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[ch]));
}
function formatDDMM(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}`;
}

// Unified match-row markup — used by team-page (past + upcoming), week view, and pool-this-week.
// One structure means one set of responsive rules; mobile collapses naturally to a 2-line card.
// Props: { date, time, homeHtml, awayHtml, division, trailing, outcome, className }
function matchRowHtml(p) {
  const cls = p.className ? `match-row ${p.className}` : "match-row";
  const dateTime = (p.date || p.time) ? `<span class="row-date">${p.date ? escape(p.date) : ""}${p.time ? ` <span class="row-time">${escape(p.time)}</span>` : ""}</span>` : "";
  const matchup = `<span class="row-matchup">${p.homeHtml || ""} <span class="vs-dash">–</span> ${p.awayHtml || ""}${p.division ? `<span class="row-div">${escape(p.division)}</span>` : ""}</span>`;
  const trail = p.trailing ? `<span class="row-trailing">${p.trailing}</span>` : "";
  const out = p.outcome ? `<span class="row-outcome ${p.outcomeCls || ""}">${escape(p.outcome)}</span>` : "";
  return `<li class="${cls}">${dateTime}${matchup}${trail}${out}</li>`;
}

// Render an Olympia "Olympia X" reference as a click-to-team-page link.
function olympiaLink(team) {
  if (!team) return "Olympia";
  return `<span class="team-link" data-team="${escape(team)}">Olympia ${escape(team)}</span>`;
}
// Render any team mention — links when it's Olympia, plain text otherwise.
function teamLabel(club, team) {
  if ((club || "").toLowerCase() === "olympia") return olympiaLink(team);
  return `${escape(club || "")} ${escape(team || "")}`.trim();
}
// Make a standings-table "Team" cell clickable if it's an Olympia row.
function teamCell(text) {
  const m = (text || "").match(/^Olympia\s+(\S+)/);
  if (m) return olympiaLink(m[1]);
  return escape(text);
}

// Monday-of-week helper for the weekly view. Returns Date (local time, midnight).
function mondayOf(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const day = d.getDay();           // 0=Sun .. 6=Sat
  const shift = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + shift);
  return d;
}
const DAYS_NL = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
const MONTHS_NL = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
function formatDateLong(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS_NL[dt.getDay()]} ${d} ${MONTHS_NL[m-1]}`;
}
function formatWeekRange(monIso) {
  const [y,m,d] = monIso.split("-").map(Number);
  const start = new Date(y, m-1, d);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  return `${start.getDate()} ${MONTHS_NL[start.getMonth()]} – ${end.getDate()} ${MONTHS_NL[end.getMonth()]} ${end.getFullYear()}`;
}

// ----- Rendering: WEEK -----
function renderWeek() {
  const main = document.getElementById("main");
  if (!state.weekStart) state.weekStart = fmtDateAPI(mondayOf(new Date()));
  const start = new Date(state.weekStart + "T00:00:00");
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    days.push(fmtDateAPI(d));
  }
  const weekEnd = days[6];

  // Pull both completed results AND scheduled games that fall in this week,
  // and tag each so the score column knows whether to render a score or "—".
  const inWeek = iso => iso >= state.weekStart && iso <= weekEnd;
  const past = (state.results  || []).filter(r => inWeek(r.date)).map(r => ({ ...r, kind:"result" }));
  const future = (state.teamGames || []).filter(g => inWeek(g.date)).map(g => ({ ...g, kind:"upcoming" }));
  const all = [...past, ...future].sort((a,b) =>
    a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

  const today = fmtDateAPI(new Date());
  const isCurrent = state.weekStart === fmtDateAPI(mondayOf(new Date()));

  // Aggregate W/V/G across all played games in this week
  let played = 0, wins = 0, draws = 0, losses = 0;
  for (const r of past) {
    const o = computeOutcome(r);
    if (!o.cls) continue;     // no score → skip
    played++;
    if (o.cls === "win")  wins++;
    else if (o.cls === "draw") draws++;
    else if (o.cls === "loss") losses++;
  }
  const pct = n => played > 0 ? Math.round(n / played * 100) : 0;

  let html = `<div class="week-controls">
    <button id="week-prev" title="Vorige week">◀</button>
    <div class="week-label">
      <div class="week-range">${formatWeekRange(state.weekStart)}</div>
      <div class="week-meta">${past.length} resultaten · ${future.length} geplande wedstrijden</div>
    </div>
    <button id="week-next" title="Volgende week">▶</button>
    <button id="week-today" ${isCurrent ? "disabled" : ""}>Deze week</button>
  </div>
  <div class="week-stats" aria-label="Weekstatistieken">
    <div class="stat played">
      <div class="stat-value">${played}</div>
      <div class="stat-label">Gespeeld</div>
    </div>
    <div class="stat win">
      <div class="stat-value">${pct(wins)}%</div>
      <div class="stat-label">Gewonnen <span class="stat-count">(${wins})</span></div>
    </div>
    <div class="stat draw">
      <div class="stat-value">${pct(draws)}%</div>
      <div class="stat-label">Gelijk <span class="stat-count">(${draws})</span></div>
    </div>
    <div class="stat loss">
      <div class="stat-value">${pct(losses)}%</div>
      <div class="stat-label">Verloren <span class="stat-count">(${losses})</span></div>
    </div>
  </div>`;

  if (all.length === 0) {
    html += `<div class="empty">Geen wedstrijden deze week.</div>`;
  } else {
    for (const d of days) {
      const dayItems = all.filter(x => x.date === d);
      if (dayItems.length === 0) continue;
      const todayCls = d === today ? "today" : "";
      html += `<section class="week-day ${todayCls}">
        <h3>${formatDateLong(d)} ${d === today ? `<span class="today-tag">vandaag</span>` : ""}</h3>
        <ul class="match-list">`;
      for (const x of dayItems) {
        const homeHtml = x.isHome ? olympiaLink(x.olympiaTeam) : teamLabel(x.opponentClub, x.opponentTeam);
        const awayHtml = x.isHome ? teamLabel(x.opponentClub, x.opponentTeam) : olympiaLink(x.olympiaTeam);
        if (x.kind === "result") {
          const o = computeOutcome(x);
          const score = (x.olympiaScore != null && x.opponentScore != null)
            ? (x.isHome ? `${x.olympiaScore} – ${x.opponentScore}` : `${x.opponentScore} – ${x.olympiaScore}`)
            : (x.score || "—");
          html += matchRowHtml({
            time: x.time,
            homeHtml, awayHtml,
            division: shortDiv(x.division),
            trailing: `<span class="score-pill ${o.cls}">${escape(score)}</span>`,
            outcome: o.letter,
            outcomeCls: o.cls,
            className: `result ${o.cls}`,
          });
        } else {
          const loc = x.isHome ? `<span class="loc-tag home">thuis</span>` : `<span class="loc-tag away">uit</span>`;
          html += matchRowHtml({
            time: x.time,
            homeHtml, awayHtml,
            division: shortDiv(x.division),
            trailing: loc,
            className: "upcoming",
          });
        }
      }
      html += `</ul></section>`;
    }
  }
  main.innerHTML = html;

  document.getElementById("week-prev").addEventListener("click", () => shiftWeek(-7));
  document.getElementById("week-next").addEventListener("click", () => shiftWeek(+7));
  document.getElementById("week-today").addEventListener("click", () => {
    state.weekStart = fmtDateAPI(mondayOf(new Date()));
    render();
  });
}
function shiftWeek(deltaDays) {
  const d = new Date(state.weekStart + "T00:00:00");
  d.setDate(d.getDate() + deltaDays);
  state.weekStart = fmtDateAPI(d);
  render();
}

// ----- Rendering: TEAMS -----
const TEAM_GROUP_ORDER = ["D", "H", "JL", "JM", "G", "T", "U19", "U16", "U14", "U12", "U11", "U10", "U9", "U8", "U7"];
const TEAM_GROUP_LABEL = {
  D:"Dames (senior)", H:"Heren (senior)",
  JL:"Junior Ladies", JM:"Junior Men",
  G:"Gentlemen", T:"Trimmers",
  U19:"U19", U16:"U16", U14:"U14", U12:"U12", U11:"U11", U10:"U10", U9:"U9", U8:"U8", U7:"U7",
};
function teamCategory(code) {
  if (!code) return "?";
  const u = code.match(/^(U\d+)/); if (u) return u[1];
  if (code.startsWith("JL") || code.startsWith("JM")) return code.slice(0, 2);
  return code.charAt(0);
}
function teamComparator(a, b) {
  const ca = teamCategory(a.code), cb = teamCategory(b.code);
  const oa = TEAM_GROUP_ORDER.indexOf(ca); const ob = TEAM_GROUP_ORDER.indexOf(cb);
  if (oa !== ob) return (oa < 0 ? 999 : oa) - (ob < 0 ? 999 : ob);
  return a.code.localeCompare(b.code, undefined, { numeric:true });
}
function computeOutcome(r) {
  if (r.olympiaScore == null || r.opponentScore == null) return { cls:"", letter:"" };
  if (r.olympiaScore >  r.opponentScore) return { cls:"win",  letter:"W" };
  if (r.olympiaScore <  r.opponentScore) return { cls:"loss", letter:"V" };
  return { cls:"draw", letter:"G" };
}

function renderTeams() {
  const main = document.getElementById("main");
  const teams = state.teams || [];
  if (teams.length === 0) {
    main.innerHTML = `<div class="empty">Geen team-data — run <code>update.ps1</code> opnieuw.</div>`;
    return;
  }
  if (!state.selectedTeam || !teams.find(t => t.code === state.selectedTeam)) {
    state.selectedTeam = teams[0].code;
  }
  const team = teams.find(t => t.code === state.selectedTeam);

  // Dropdown grouped by category
  const sorted = [...teams].sort(teamComparator);
  const grouped = new Map();
  for (const t of sorted) {
    const c = teamCategory(t.code);
    if (!grouped.has(c)) grouped.set(c, []);
    grouped.get(c).push(t);
  }
  const optgroups = [];
  for (const cat of TEAM_GROUP_ORDER) {
    if (!grouped.has(cat)) continue;
    const opts = grouped.get(cat).map(t =>
      `<option value="${escape(t.code)}" ${t.code === team.code ? "selected" : ""}>${escape(t.code)}</option>`
    ).join("");
    optgroups.push(`<optgroup label="${escape(TEAM_GROUP_LABEL[cat] || cat)}">${opts}</optgroup>`);
  }

  let html = `<div class="team-controls">
    <label for="team-select">Team</label>
    <select id="team-select">${optgroups.join("")}</select>
    <div class="team-comp">${escape(cleanDivision(team.division))}</div>
  </div>`;

  // Standings + this-week-in-pool side-by-side (stacks on narrow viewports)
  html += `<section class="team-section pool-row">`;
  html += `<div class="pool-col standing-col"><h2>Rangschikking</h2>`;
  if (team.standing && team.standing.rows && team.standing.rows.length > 0) {
    const cols = team.standing.columns;
    const myLabel = `Olympia ${team.code}`;
    html += `<div class="standing-wrap"><table class="standing-table">
      <thead><tr>${cols.map(c => `<th>${escape(c)}</th>`).join("")}</tr></thead>
      <tbody>${team.standing.rows.map(row => {
        const isOurs = (row[1] || "").trim() === myLabel;
        return `<tr class="${isOurs ? "ours" : ""}">${row.map((cell, i) => {
          const cls = i === 0 ? "rank" : (i === 1 ? "team" : "num");
          // Any "Olympia X" in the team column becomes a click-through.
          const content = (i === 1) ? teamCell(cell) : escape(cell);
          return `<td class="${cls}">${content}</td>`;
        }).join("")}</tr>`;
      }).join("")}</tbody>
    </table></div>`;
  } else {
    html += `<div class="empty-section">Geen rangschikking beschikbaar voor deze competitie.</div>`;
  }
  html += `</div>`;  // .standing-col

  // Pool-wide games this calendar week (Mon-Sun) — all teams in the competition,
  // not just Olympia. Shows results for past days and scheduled matches for upcoming.
  html += `<div class="pool-col pool-week-col"><h2>Deze week in de poule</h2>`;
  const poolList = (state.poolGames && team.poolId) ? (state.poolGames[team.poolId] || []) : [];
  if (poolList.length === 0) {
    html += `<div class="empty-section">Geen poule-wedstrijden gevonden.</div>`;
  } else {
    const mondayIso = fmtDateAPI(mondayOf(new Date()));
    const sundayIso = (() => { const d = mondayOf(new Date()); d.setDate(d.getDate()+6); return fmtDateAPI(d); })();
    const inWeek = poolList
      .filter(p => p.date >= mondayIso && p.date <= sundayIso)
      .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
    if (inWeek.length === 0) {
      html += `<div class="empty-section">Geen wedstrijden deze week in deze poule.</div>`;
    } else {
      // Group by day for readability
      const days = [...new Set(inWeek.map(p => p.date))];
      const today = fmtDateAPI(new Date());
      html += `<div class="pool-week-list">`;
      for (const d of days) {
        const dayItems = inWeek.filter(p => p.date === d);
        const todayCls = d === today ? "today" : "";
        html += `<div class="pool-day ${todayCls}">
          <div class="pool-day-header">${formatDateLong(d)}${d===today?` <span class="today-tag">vandaag</span>`:""}</div>
          <ul class="match-list pool-week-matches">`;
        for (const p of dayItems) {
          const isOlympiaHome = p.homeClub === "Olympia";
          const isOlympiaAway = p.awayClub === "Olympia";
          const isOurMatch = isOlympiaHome && p.homeTeam === team.code || isOlympiaAway && p.awayTeam === team.code;
          const home = isOlympiaHome ? olympiaLink(p.homeTeam) : `${escape(p.homeClub)} ${escape(p.homeTeam)}`;
          const away = isOlympiaAway ? olympiaLink(p.awayTeam) : `${escape(p.awayClub)} ${escape(p.awayTeam)}`;
          let scoreCell = "";
          if (p.isPast) {
            const score = (p.homeScore != null && p.awayScore != null) ? `${p.homeScore} – ${p.awayScore}` : (p.score || "—");
            scoreCell = `<span class="pool-score played">${escape(score)}</span>`;
          } else {
            scoreCell = `<span class="pool-score scheduled">${escape(p.time || "")}</span>`;
          }
          html += `<li class="pool-match ${isOurMatch ? "our-match" : ""}">
            <span class="pool-teams">${home} <span class="vs-dash">–</span> ${away}</span>
            ${scoreCell}
          </li>`;
        }
        html += `</ul></div>`;
      }
      html += `</div>`;
    }
  }
  html += `</div>`;  // .pool-week-col
  html += `</section>`;  // .pool-row

  // Upcoming matches first (teamGames — sorted ascending by update.ps1)
  const upcoming = (state.teamGames || []).filter(g => g.olympiaTeam === team.code);
  html += `<section class="team-section">
    <h2>Komende wedstrijden</h2>`;
  if (upcoming.length === 0) {
    html += `<div class="empty-section">Geen geplande wedstrijden.</div>`;
  } else {
    html += `<ul class="match-list">`;
    for (const g of upcoming.slice(0, 12)) {
      const homeHtml = g.isHome ? `<strong>${olympiaLink(g.olympiaTeam)}</strong>` : `${escape(g.opponentClub)} ${escape(g.opponentTeam)}`;
      const awayHtml = g.isHome ? `${escape(g.opponentClub)} ${escape(g.opponentTeam)}` : `<strong>${olympiaLink(g.olympiaTeam)}</strong>`;
      let trailing;
      if (g.isHome && g.fieldCode) {
        trailing = `<span class="field-badge" data-nav-date="${escape(g.date)}" data-nav-time="${escape(g.time)}" title="Open in Veldindeling">${escape(fieldLabel(g.fieldCode, g.subpath))} <span class="field-arrow">→</span></span>`;
      } else if (g.isHome) {
        trailing = `<span class="loc-tag home">thuis</span>`;
      } else {
        trailing = `<span class="loc-tag away">uit</span>`;
      }
      html += matchRowHtml({
        date: formatDDMM(g.date),
        time: g.time,
        homeHtml, awayHtml,
        trailing,
        className: "upcoming",
      });
    }
    html += `</ul>`;
  }
  html += `</section>`;

  // Last matches (results — already sorted by update.ps1 most-recent-first)
  const lastMatches = (state.results || []).filter(r => r.olympiaTeam === team.code).slice(0, 10);
  html += `<section class="team-section">
    <h2>Laatste wedstrijden</h2>`;
  if (lastMatches.length === 0) {
    html += `<div class="empty-section">Geen recente wedstrijden gevonden.</div>`;
  } else {
    html += `<ul class="match-list">`;
    for (const r of lastMatches) {
      const o = computeOutcome(r);
      const homeHtml = r.isHome ? `<strong>${olympiaLink(r.olympiaTeam)}</strong>` : `${escape(r.opponentClub)} ${escape(r.opponentTeam)}`;
      const awayHtml = r.isHome ? `${escape(r.opponentClub)} ${escape(r.opponentTeam)}` : `<strong>${olympiaLink(r.olympiaTeam)}</strong>`;
      const score = (r.olympiaScore != null && r.opponentScore != null)
        ? (r.isHome ? `${r.olympiaScore} – ${r.opponentScore}` : `${r.opponentScore} – ${r.olympiaScore}`)
        : (r.score || "—");
      html += matchRowHtml({
        date: formatDDMM(r.date),
        homeHtml, awayHtml,
        trailing: `<span class="score-pill ${o.cls}">${escape(score)}</span>`,
        outcome: o.letter,
        outcomeCls: o.cls,
        className: `result ${o.cls}`,
      });
    }
    html += `</ul>`;
  }
  html += `</section>`;

  main.innerHTML = html;
  document.getElementById("team-select").addEventListener("change", e => {
    state.selectedTeam = e.target.value;
    render();
  });
}

// ----- State -----
const state = {
  date: fmtDateAPI(new Date()),
  view: "timeline",
  fieldGames: [],   // Olympia home games with field/subpath info (for timeline + layout views)
  teamGames: [],    // ALL Olympia games (home + away) — for team view's "upcoming"
  results: [],      // Past Olympia games with scores — for team view's "last matches"
  teams: [],        // [{ code, division, poolId, standing }, ...]
  poolGames: {},    // poolId -> [pool-wide games] for the "this week in this pool" panel
  activeSlot: null,
  selectedTeam: null,
  weekStart: null,  // Monday (YYYY-MM-DD) for the Week view
  mobileTimelineField: null,   // which single field column to show on phones
  updated: null,
};

function render() {
  if (state.view === "teams") { renderTeams(); return; }
  if (state.view === "week")  { renderWeek();  return; }
  const today = gamesOnDate(state.fieldGames, state.date);
  if (state.view === "timeline") renderTimeline(today);
  else renderLayout(today, state.activeSlot);
}

// Navigate to a team page from anywhere a team name was clicked.
function navigateToTeam(code) {
  state.selectedTeam = code;
  state.view = "teams";
  document.querySelectorAll("header .tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.view === "teams"));
  render();
}
// Navigate to the field-layout view for a specific date + time slot. Used when a
// user clicks a "Veld X" badge on a home game in the Teams view.
function navigateToFieldView(date, time) {
  state.date = date;
  state.view = "layout";
  state.activeSlot = time;
  const di = document.getElementById("date");
  if (di) di.value = date;
  document.querySelectorAll("header .tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.view === "layout"));
  render();
}
function fieldLabel(fieldCode, subpath) {
  if (!fieldCode) return "";
  const sub = (Array.isArray(subpath) ? subpath : []).join("");
  // Format: "Veld 5A" (half), "Veld 5B1a" (eighth), "Veld 2 (volledig)" (full field).
  return sub ? `Veld ${fieldCode}${sub}` : `Veld ${fieldCode} (volledig)`;
}

// ----- Boot -----
(function init() {
  const data = loadEmbedded();
  state.fieldGames = data.fieldGames;
  state.teamGames  = data.teamGames;
  state.results    = data.results;
  state.teams      = data.teams;
  state.poolGames  = data.poolGames;
  state.updated    = data.updated;
  document.getElementById("status").textContent = `Bijgewerkt: ${fmtUpdated(data.updated)}`;

  document.getElementById("date").value = state.date;
  document.getElementById("date").addEventListener("change", e => {
    state.date = e.target.value; state.activeSlot = null; render();
  });
  document.getElementById("today").addEventListener("click", () => {
    state.date = fmtDateAPI(new Date());
    document.getElementById("date").value = state.date;
    state.activeSlot = null; render();
  });
  document.getElementById("prev").addEventListener("click", () => shiftDay(-1));
  document.getElementById("next").addEventListener("click", () => shiftDay(+1));
  function shiftDay(delta) {
    const d = new Date(state.date + "T00:00:00");
    d.setDate(d.getDate() + delta);
    state.date = fmtDateAPI(d);
    document.getElementById("date").value = state.date;
    state.activeSlot = null; render();
  }
  document.querySelectorAll("header .tabs button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll("header .tabs button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      state.view = b.dataset.view; render();
    });
  });
  // Delegated handler: .team-link opens the team page; .field-badge opens Veldindeling.
  document.getElementById("main").addEventListener("click", e => {
    const fb = e.target.closest(".field-badge");
    if (fb) {
      e.preventDefault();
      navigateToFieldView(fb.dataset.navDate, fb.dataset.navTime);
      return;
    }
    const link = e.target.closest(".team-link");
    if (link) {
      e.preventDefault();
      navigateToTeam(link.dataset.team);
    }
  });
  render();
})();
</script>
</body>
